name: Fetch Menus

on:
  schedule:
    - cron: '25 8 * * 1'    # 09:25 WT
    - cron: '15 9 * * 1-5'  # 10:15 WT
    - cron: '25 9 * * 1-5'  # 10:25 WT
    - cron: '35 9 * * 1-5'  # 10:35 WT
    - cron: '45 10 * * 1-5' # 10:45 WT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - run: npm ci
        working-directory: scraper

      - run: npm run build
        working-directory: scraper

      - run: npm run scrape
        working-directory: scraper

      - name: Translate menu data
        continue-on-error: true
        run: npm run translate
        working-directory: scraper

      - name: Commit and push menu data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update menu data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
