name: Fetch Menus

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - run: npm ci
        working-directory: scraper

      - run: npm run build
        working-directory: scraper

      - run: npm run scrape
        working-directory: scraper

      - name: Commit and push menu data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update menu data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
