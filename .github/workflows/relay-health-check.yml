name: Relay Health Check

on:
  schedule:
    # Daily 5:00 UTC (6:00 CET / 7:00 CEST). fails pipeline if too few relays are reachable
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: voting/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: voting

      - name: Build
        run: npm run build
        working-directory: voting

      - name: Probe relays
        run: npm run health-check
        working-directory: voting
