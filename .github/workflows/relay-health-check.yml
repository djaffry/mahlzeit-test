name: Relay Health Check

on:
  schedule:
    # Daily 5:00 UTC (6:00 CET / 7:00 CEST) — fails pipeline if too few relays are reachable
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: rooms/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: rooms

      - name: Build
        run: npm run build
        working-directory: rooms

      - name: Probe relays
        run: npm run health-check
        working-directory: rooms
