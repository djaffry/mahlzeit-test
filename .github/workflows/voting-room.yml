name: Update Voting Config

on:
  push:
    branches: [main]
    paths:
      - 'voting/config/**'
      - 'voting/src/**'
  workflow_dispatch:

concurrency:
  group: voting-config
  cancel-in-progress: false

jobs:
  update-voting:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    outputs:
      data-changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            voting/package-lock.json

      - name: Install voting dependencies
        run: npm ci
        working-directory: voting

      - name: Build voting
        run: npm run build
        working-directory: voting

      - name: Generate voting.json
        run: npm run generate
        working-directory: voting

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain data/voting.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull latest (avoid push race with fetch-and-deploy)
        if: steps.changes.outputs.changed == 'true'
        run: git pull --rebase

      - name: Commit and push voting data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/voting.json
          git commit -m "chore: update voting config"
          git push

      - name: Install root dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Install scraper dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci
        working-directory: scraper

      - name: Build site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Upload pages artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

  deploy:
    needs: update-voting
    if: needs.update-voting.outputs.data-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
