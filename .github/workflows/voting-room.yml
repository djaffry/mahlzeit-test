name: Update Voting Config

on:
  push:
    branches: [main]
    paths:
      - 'rooms/config/**'
      - 'rooms/src/**'
  workflow_dispatch:

concurrency:
  group: voting-config
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-voting:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      data-changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            rooms/package-lock.json

      - name: Install rooms dependencies
        run: npm ci
        working-directory: rooms

      - name: Build rooms
        run: npm run build
        working-directory: rooms

      - name: Generate voting.json
        run: npm run generate
        working-directory: rooms

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain data/voting.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull latest (avoid push race with fetch-and-deploy)
        if: steps.changes.outputs.changed == 'true'
        run: git pull --rebase

      - name: Commit and push voting data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/voting.json
          git commit -m "chore: update voting config"
          git push

      - name: Install root dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Install scraper dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci
        working-directory: scraper

      - name: Build site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Upload pages artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: update-voting
    if: needs.update-voting.outputs.data-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
