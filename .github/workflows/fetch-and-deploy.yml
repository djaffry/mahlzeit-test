name: Fetch and Deploy Menus

on:
  schedule:
    - cron: '25 7 * * 1'
    - cron: '20 8 * * 1-5'
    - cron: '40 8 * * 1-5'
  workflow_dispatch:

concurrency:
  group: fetch-and-deploy
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    outputs:
      data-changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: npm ci
        working-directory: scraper

      - name: Build scraper
        run: npm run build
        working-directory: scraper

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare week-branch worktree
        id: week
        run: |
          set -euo pipefail
          export TZ="$(jq -r '.timezone' data/config.json)"
          YEAR=$(date +%G)
          WEEK=$(date +%V)
          BRANCH="data-${YEAR}-W${WEEK}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if git fetch --no-tags origin "$BRANCH:refs/remotes/origin/$BRANCH" 2>/dev/null; then
            git worktree add .week "origin/$BRANCH"
            ( cd .week && git checkout -B "$BRANCH" )
          else
            git worktree add --orphan -b "$BRANCH" .week
          fi
          mkdir -p .week/de .week/en

      - name: Fetch menu data
        env:
          PECKISH_DATA_DIR: ${{ github.workspace }}/.week
          PECKISH_GLOBALS_DIR: ${{ github.workspace }}/data
        run: node dist/scrape-runner.js
        working-directory: scraper

      - name: Translate menu data
        id: translate
        continue-on-error: true
        env:
          PECKISH_DATA_DIR: ${{ github.workspace }}/.week
          PECKISH_GLOBALS_DIR: ${{ github.workspace }}/data
        run: node dist/translate-runner.js
        working-directory: scraper

      - name: Warn if translation failed
        if: steps.translate.outcome == 'failure'
        run: echo "::warning::Translation failed. Deploying without fresh translations."

      - name: Commit and push week branch
        id: commit
        run: |
          set -euo pipefail
          cd .week
          if [ -z "$(git status --porcelain de en 2>/dev/null || true)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no week-branch changes"
            exit 0
          fi
          git add de en 2>/dev/null || true
          git commit -m "chore: update menu data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --set-upstream origin "${{ steps.week.outputs.branch }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push global changes on main (manifest/tags/unknown-tags/translation-cache)
        if: steps.commit.outputs.changed == 'true'
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore: update menu globals $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # voting-room.yml may push to main concurrently; rebase before push to avoid races
            git pull --rebase
            git push
          fi

      - name: Typecheck
        if: steps.commit.outputs.changed == 'true'
        run: npm run typecheck

      - name: Run tests
        if: steps.commit.outputs.changed == 'true'
        run: npm test

      - name: Build site
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Assemble data for deploy
        if: steps.commit.outputs.changed == 'true'
        uses: ./.github/actions/assemble-data

      - name: Upload pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

  deploy:
    needs: fetch-and-build
    if: needs.fetch-and-build.outputs.data-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
