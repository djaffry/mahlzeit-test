name: Fetch and Deploy Menus

# Fetches data, validates, commits to main, and deploys.
# Self-contained because GITHUB_TOKEN pushes don't trigger other workflows.

on:
  schedule:
    # UTC — add 1h for CET (winter), 2h for CEST (summer)
    - cron: '25 8 * * 1'
    - cron: '15 9 * * 1-5'
    - cron: '25 9 * * 1-5'
    - cron: '35 9 * * 1-5'
    - cron: '45 10 * * 1-5'
  workflow_dispatch:

concurrency:
  group: fetch-and-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      data-changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install scraper dependencies
        run: npm ci
        working-directory: scraper

      - name: Build scraper
        run: npm run build
        working-directory: scraper

      - name: Fetch menu data
        run: npm run scrape
        working-directory: scraper

      - name: Translate menu data
        id: translate
        continue-on-error: true
        run: npm run translate
        working-directory: scraper

      - name: Warn if translation failed
        if: steps.translate.outcome == 'failure'
        run: echo "::warning::Translation failed — deploying without translations"

      - name: Check for data changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain data/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck
        if: steps.changes.outputs.changed == 'true'
        run: npm run typecheck

      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: npm test

      - name: Build site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Commit and push menu data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update menu data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Upload pages artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: fetch-and-build
    if: needs.fetch-and-build.outputs.data-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
