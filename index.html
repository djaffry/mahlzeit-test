<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mittagsmenü am Austria Campus</title>
<link rel="icon" type="image/svg+xml" href="ui/icons/favicon.svg">
<link rel="apple-touch-icon" href="ui/icons/icon-maskable-light-180.png">
<link rel="manifest" href="ui/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<!-- Apply saved theme before CSS loads to prevent dark→light flash -->
<script>var t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
<link rel="stylesheet" href="ui/style.css">
<link rel="stylesheet" href="ui/carousel/carousel.css">
<link rel="stylesheet" href="ui/dice/dice.css">
<link rel="stylesheet" href="ui/share/share.css">
<link rel="stylesheet" href="ui/streak/streak.css">
<meta name="theme-color" content="#f5c2e7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mittagsmenü">
</head>
<body>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="toolbar-top">
      <a class="toolbar-brand" href="." onclick="event.preventDefault(); window.location.reload();">
        <svg class="toolbar-logo" width="24" height="24" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="64" height="64" rx="16" fill="currentColor" class="logo-bg"/>
          <path fill-rule="evenodd" fill="currentColor" class="logo-fg" d="M 16,7 L 48,7 Q 52,7 52,11 L 36,35 L 36,53 Q 36,57 32,57 Q 28,57 28,53 L 28,35 L 12,11 Q 12,7 16,7 Z M 23,8 L 27,8 L 29,27 Z M 37,8 L 41,8 L 35,27 Z"/>
        </svg>
        <div>
          <div class="toolbar-title">Mittagsmenü</div>
          <div class="toolbar-subtitle">Austria Campus, Wien</div>
        </div>
      </a>
      <div class="streak-flame" data-tier="0" aria-label="Streak: 0 Tage" role="status">
        <span class="streak-emoji" aria-hidden="true">🔥</span><span class="streak-number"></span>
      </div>
      <div class="day-tabs" id="day-tabs"></div>
      <div class="toolbar-actions">
        <button class="search-trigger" id="search-trigger" aria-label="Suche (Ctrl+K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <a class="feedback-link" href="https://github.com/djaffry/mahlzeit-test/issues" target="_blank" rel="noopener" aria-label="Feedback & Beitragen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </a>
        <button class="dice-btn" id="dice-btn" aria-label="Zufällig auswählen">🎲</button>
        <button class="theme-toggle" id="theme-toggle" aria-label="Theme umschalten">
          <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="filters" id="filters">
  <span class="filters-label">Filter</span>
</div>

<div class="content" id="content"></div>

<div class="footer" id="footer"></div>

<button class="party-easter-egg" id="party-toggle" aria-label="Party Modus">
  <span class="party-easter-egg-emoji">🪩</span>
  <span class="party-easter-egg-text">Psst...</span>
  <span class="party-easter-egg-active-text">Party!</span>
</button>

<div class="search-overlay" id="search-overlay" hidden>
  <div class="search-modal">
    <div class="search-input-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="Gericht oder Restaurant suchen..." autocomplete="off" />
      <kbd class="search-kbd">Esc</kbd>
    </div>
    <div class="search-results" id="search-results" aria-live="polite" aria-atomic="true"></div>
  </div>
</div>

<div class="map-overlay" id="map-overlay" hidden>
  <div class="map-header">
    <span class="map-title">Restaurants in der Nähe</span>
    <button class="map-close" id="map-close" aria-label="Karte schließen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="map-container" id="map-container"></div>
</div>

<div class="dice-overlay" id="dice-overlay" aria-hidden="true"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" integrity="sha512-puJW3E/qXDqYp9IfhAI54BJEaWIfloJ7JWs7OeD5i6ruC9JZL1gERT1wjtwXFlh7CjE7ZJ+/vcRZRkIYIb6p4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="ui/tag-utils.js"></script>
<script src="ui/carousel/carousel.js"></script>
<script src="ui/dice/dice.js"></script>
<script src="ui/share/share.js"></script>
<script src="ui/streak/streak.js"></script>
<script src="ui/app.js"></script>
</body>
</html>
