<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Peckish</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <!-- CSP: connect-src relay list must match voting/config/relays.json -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-UBRi4PPF4Q6t8CHZHKoUNUKBT76/bfp9+X23Qrw8StQ='; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://relay.damus.io wss://nos.lol wss://relay.primal.net wss://relay.snort.social; img-src 'self' data: https://*.tile.openstreetmap.org; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self';" />
  <script>
    (function() {
      var d = document.documentElement;
      var t = localStorage.getItem("theme");
      var dark = t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (dark) {
        d.dataset.theme = "dark";
        d.style.background = "#111";
        d.style.color = "#e8e8e8";
        document.querySelector('meta[name="theme-color"]').setAttribute("content", "#111111");
      } else {
        d.style.background = "#fff";
        d.style.color = "#1a1a1a";
      }
    })();
  </script>
  <style>
    /* Prevent FOUC: hide icon buttons until CSS loads and paints */
    .icon-btn { visibility: hidden; }
  </style>
</head>
<body>
  <header class="header" id="header">
    <a class="header-brand" href="." id="brand-link">
      <span class="header-icon" id="brand-icon"></span>
      <span class="header-title">peckish</span>
    </a>
    <div class="header-actions">
      <button class="icon-btn desktop-only" id="reload-trigger" aria-label="Reload"></button>
      <button class="icon-btn" id="filter-trigger" aria-label="Filters"></button>
      <button class="icon-btn lang-toggle-btn" id="lang-toggle" aria-label="Language"></button>
      <button class="avatar-badge" id="avatar-badge" hidden aria-label="Voting rooms"></button>
      <button class="icon-btn" id="more-menu-trigger" aria-label="Menu"></button>
    </div>
  </header>

  <div class="main-content">
    <main class="timeline" id="timeline"></main>

    <footer class="footer" id="footer"></footer>
  </div>

  <!-- Search overlay -->
  <div class="search-overlay" id="search-overlay" hidden>
    <div class="search-container">
      <input class="search-input" id="search-input" type="search" autocomplete="off" />
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- More menu (popover on desktop, bottom sheet on mobile) -->
  <div class="more-menu-overlay" id="more-menu-overlay" hidden>
    <nav class="more-menu" id="more-menu"></nav>
  </div>

  <!-- Dice overlay -->
  <div class="dice-overlay" id="dice-overlay" hidden></div>

  <script type="module" src="/ui/main.ts"></script>
</body>
</html>
